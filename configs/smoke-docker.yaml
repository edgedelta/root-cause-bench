# root-cause-bench — smoke test: one model, one scenario, one attempt.
# Usage: set -a && source .env && set +a && harbor run -c configs/smoke-docker.yaml -y
jobs_dir: jobs
n_attempts: 1
n_concurrent_trials: 1
quiet: false

environment:
  type: docker

agents:
