# root-cause-bench — all scenarios, several frontier models (Docker).
# Usage: set -a && source .env && set +a && harbor run -c configs/all-models-docker.yaml -y
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 8
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-opus-4.8
  - name: terminus-2
    model_name: openrouter/anthropic/claude-sonnet-4.6
  - name: terminus-2
    model_name: openrouter/anthropic/claude-haiku-4.5
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.5
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.4
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.4-mini
  - name: terminus-2
    model_name: openrouter/google/gemini-3.1-pro-preview
  - name: terminus-2
    model_name: openrouter/google/gemini-3.5-flash
  - name: terminus-2
    model_name: openrouter/google/gemini-3.1-flash-lite
  - name: terminus-2
    model_name: openrouter/openai/gpt-oss-120b
  - name: terminus-2
    model_name: openrouter/openai/gpt-oss-20b
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2.5
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2-thinking

datasets:
  - path: datasets/rootcausebench
    task_names:
      - ai-agent-registration-missing
      - checkout-latency-n-plus-one
      - dashboard-db-schema-missing-table
      - dynamodb-write-capacity-breach
      - inventory-connection-pool-exhaustion
      - metric-ingestor-metadata-deser
      - olapdb-tso-cas-retry-budget
      - payment-nil-deref-panic
      - recommendation-memory-leak
      - transformer-dependency-startup-crash
      - logging-debug-disk-fill
      - frontend-race-condition-5xx
      - search-mapping-query-break
      - cache-ttl-stampede
      - auth-jwt-validation-regression
      - grpc-deadline-too-tight
      - unbounded-query-delayed-onset
      - upstream-payment-provider-outage
      - traffic-surge-flash-sale
      - tls-cert-expiry
      - noisy-neighbor-node-saturation
      - bad-data-poison-record
      - cloud-region-impairment
      - dns-resolver-degradation
