# root-cause-bench — leaderboard v2: full re-run, all 22 models (Docker).
#
# Changes vs the v1 frozen run (2026-06-30/07-02):
#   - override_timeout_sec: 1800 for every agent (v1's 600s cap cost
#     deepseek-v4-flash 4 of its 6 failures as AgentTimeoutError; 9 trials
#     across 5 models were timeout losses)
#   - graders emit per-trial graded reward (verifier/metrics.json): 1.0 for
#     the correct culprit SHA, 0.0 for blaming an innocent-deploy decoy,
#     otherwise partial credit <= 0.5 from the secondary diagnosis
#   - adds sakana/fugu-ultra and anthropic/claude-fable-5
#
# NOTE: anthropic/claude-fable-5 rate-limits at 8 concurrent agents on
# OpenRouter — run it separately at n_concurrent_trials: 2 (the 2026-07-07 v2
# run used configs/fable-5-docker.yaml for that leg) and merge with:
#   python3 scripts/gen_results.py jobs/<main-run> jobs/<fable-run> benchmark-results/rootcausebench
#
# Methodology: any residual AgentTimeoutError trial is an infra error to
# re-run, not a scored failure.
#
# Usage: set -a && source .env && set +a && harbor run -c configs/leaderboard-v2-docker.yaml -y
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 8
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-fable-5
    override_timeout_sec: 1800
